version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: todo
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306" # MySQL (host:container)
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d # initialization scripts

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80" # access via http://localhost:8080
    depends_on:
      - db

  web:
    build: # custom image with required PHP extensions
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:80" # access the todo app
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

volumes:
  db_data:
